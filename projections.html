<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ATAM Stock — Projections</title>
<style>
* { box-sizing: border-box; }
body { background: #020617; margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; color: #e8edf5; }
.topbar {
  position: sticky; top: 0; z-index: 50;
  background: rgba(2,6,23,0.95); backdrop-filter: blur(20px);
  border-bottom: 1px solid rgba(255,255,255,0.06);
  padding: 14px 28px; display: flex; align-items: center; justify-content: space-between; gap: 16px;
}
.topbar h1 { font-size: 22px; font-weight: 800; margin: 0; letter-spacing: -0.5px; }
.topbar .eyebrow { font-size: 10px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: #38bdf8; margin: 0 0 1px; }
.back-link { font-size: 12px; color: #64748b; text-decoration: none; display: flex; align-items: center; gap: 6px; }
.back-link:hover { color: #38bdf8; }
#connectionStatus { font-size: 12px; font-weight: 700; color: #64748b; }
#connectionStatus.connected { color: #4ade80; }
.main { max-width: 1200px; margin: 0 auto; padding: 28px 28px 80px; }

.kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; margin-bottom: 28px; }
.kpi-card { background: #0d1525; border: 1px solid #1e2d45; border-radius: 12px; padding: 16px; position: relative; overflow: hidden; }
.kpi-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, #38bdf8, #6366f1); }
.kpi-card.proj::before { background: linear-gradient(90deg, #a78bfa, #38bdf8); }
.kpi-card span { font-size: 10px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: #64748b; }
.kpi-card strong { display: block; font-size: 26px; font-weight: 800; margin-top: 4px; color: #f8fafc; font-variant-numeric: tabular-nums; }
.kpi-card small { display: block; font-size: 11px; margin-top: 3px; }
.kpi-card small.up { color: #4ade80; }
.kpi-card small.down { color: #f87171; }
.kpi-card small.flat { color: #64748b; }

.panel { background: #0d1525; border: 1px solid #1e2d45; border-radius: 14px; padding: 22px; margin-bottom: 22px; }
.panel-title { font-size: 13px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.05em; color: #94a3b8; margin: 0 0 4px; }
.panel-sub { font-size: 12px; color: #64748b; margin: 0 0 18px; }

.slider-row { display: flex; align-items: center; gap: 16px; margin-bottom: 22px; }
.slider-row label { font-size: 12px; color: #94a3b8; white-space: nowrap; }
input[type="range"] {
  flex: 1; height: 4px; border-radius: 4px; background: #1e2d45; outline: none;
  -webkit-appearance: none; appearance: none;
}
input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none; width: 18px; height: 18px; border-radius: 50%;
  background: #38bdf8; cursor: pointer; box-shadow: 0 0 0 4px rgba(56,189,248,0.2);
}
input[type="range"]::-moz-range-thumb {
  width: 18px; height: 18px; border-radius: 50%; background: #38bdf8; cursor: pointer; border: none;
  box-shadow: 0 0 0 4px rgba(56,189,248,0.2);
}
.slider-value { font-size: 15px; font-weight: 800; color: #38bdf8; min-width: 90px; text-align: right; font-variant-numeric: tabular-nums; }

.chart-wrap { position: relative; height: 360px; margin-bottom: 8px; }
.legend-row { display: flex; gap: 20px; margin-bottom: 14px; font-size: 12px; color: #94a3b8; flex-wrap: wrap; }
.legend-row span { display: inline-flex; align-items: center; gap: 6px; }
.legend-dot { width: 10px; height: 10px; border-radius: 3px; flex-shrink: 0; }

.method-box { background: rgba(56,189,248,0.05); border: 1px solid rgba(56,189,248,0.2); border-radius: 12px; padding: 16px 18px; font-size: 12.5px; line-height: 1.65; color: #b6c2d4; }
.method-box strong { color: #e8edf5; }
.method-box ul { margin: 8px 0 0; padding-left: 18px; }
.method-box li { margin-bottom: 5px; }

.month-table { width: 100%; border-collapse: collapse; font-size: 12.5px; margin-top: 6px; }
.month-table th { text-align: right; padding: 8px 10px; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: #475569; border-bottom: 1px solid #1e2d45; }
.month-table th:first-child { text-align: left; }
.month-table td { padding: 8px 10px; text-align: right; border-bottom: 1px solid rgba(255,255,255,0.04); color: #cbd5e1; font-variant-numeric: tabular-nums; }
.month-table td:first-child { text-align: left; font-weight: 700; color: #f8fafc; }
.month-table tr.projected td { color: #a78bfa; }
.month-table tr.projected td:first-child { color: #c4b5fd; }
.tag { font-size: 9px; padding: 2px 6px; border-radius: 20px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.04em; margin-left: 6px; }
.tag.actual { background: rgba(56,189,248,0.15); color: #38bdf8; }
.tag.projected { background: rgba(167,139,250,0.15); color: #a78bfa; }

.loading { text-align: center; padding: 60px; color: #64748b; font-size: 13px; }
</style>
</head>
<body>

<div class="topbar">
  <div>
    <p class="eyebrow">ATAM Workwear</p>
    <h1>Stock projections</h1>
  </div>
  <a class="back-link" href="index.html">&larr; Back to stock ledger</a>
</div>

<div class="main" id="app">
  <div class="loading">Loading purchase history&hellip;</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
(function(){
'use strict';

const VALUE_URL = 'https://aobosyvlhgkxhjxkfzlz.supabase.co';
const VALUE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFvYm9zeXZsaGdreGhqeGtmemx6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1MTA4NDAsImV4cCI6MjA5NjA4Njg0MH0.MwfoPHpa--9uiwCcgtzUn2nFMBcFawQAg44rmSdisyQ';

const MONTH_NAMES = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

let spendRows = [];
let currentTotalValue = 0;
let chart = null;

function money(v){ return '\u00a3' + Number(v||0).toLocaleString('en-GB',{minimumFractionDigits:0,maximumFractionDigits:0}); }
function moneyPrecise(v){ return '\u00a3' + Number(v||0).toLocaleString('en-GB',{minimumFractionDigits:2,maximumFractionDigits:2}); }

async function fetchJSON(base, key, path){
  const res = await fetch(base + path, { headers: { apikey: key, Authorization: 'Bearer ' + key } });
  if(!res.ok) throw new Error('Request failed '+res.status);
  return res.json();
}

function buildSeasonalIndex(rows){
  // Average spend per calendar month across whatever years of history exist.
  const byMonthNum = {};
  for(const r of rows){
    const monthNum = Number(r.month_key.slice(5,7));
    if(!byMonthNum[monthNum]) byMonthNum[monthNum] = [];
    byMonthNum[monthNum].push(Number(r.total_spend));
  }
  const overallAvg = rows.reduce((s,r)=>s+Number(r.total_spend),0) / rows.length;
  const index = {};
  for(let m=1;m<=12;m++){
    if(byMonthNum[m] && byMonthNum[m].length){
      const avg = byMonthNum[m].reduce((a,b)=>a+b,0) / byMonthNum[m].length;
      index[m] = avg / overallAvg;
    } else {
      index[m] = 1;
    }
  }
  return { index, overallAvg };
}

function projectForward(monthsAhead, seasonal, baseValue, baseMonthNum){
  const points = [];
  for(let i=1;i<=monthsAhead;i++){
    const targetMonthNum = ((baseMonthNum - 1 + i) % 12) + 1;
    const baseIdx = seasonal.index[baseMonthNum] || 1;
    const targetIdx = seasonal.index[targetMonthNum] || 1;
    const projectedValue = baseValue * (targetIdx / baseIdx);
    points.push({ monthNum: targetMonthNum, value: projectedValue, seasonalIndex: targetIdx });
  }
  return points;
}

function render(){
  const app = document.getElementById('app');

  const seasonal = buildSeasonalIndex(spendRows);
  const now = new Date();
  const currentMonthNum = now.getMonth() + 1;

  app.innerHTML = `
    <div class="kpi-grid">
      <div class="kpi-card">
        <span>Current stock value</span>
        <strong id="kpiCurrent">${moneyPrecise(currentTotalValue)}</strong>
        <small class="flat">Live from stock ledger</small>
      </div>
      <div class="kpi-card proj">
        <span>Projected value at slider month</span>
        <strong id="kpiProjected">&mdash;</strong>
        <small id="kpiProjectedDelta">&nbsp;</small>
      </div>
      <div class="kpi-card">
        <span>Avg monthly purchasing</span>
        <strong>${money(seasonal.overallAvg)}</strong>
        <small class="flat">Across ${spendRows.length} months of real history</small>
      </div>
      <div class="kpi-card">
        <span>Seasonal peak month</span>
        <strong id="kpiPeak">&mdash;</strong>
        <small class="flat">Historically highest spend</small>
      </div>
    </div>

    <div class="panel">
      <p class="panel-title">Projected stock value</p>
      <p class="panel-sub">Slide to see how stock value is projected to move, based on your own purchasing seasonality.</p>

      <div class="slider-row">
        <label>Months ahead</label>
        <input type="range" id="monthSlider" min="1" max="12" value="6" step="1">
        <span class="slider-value" id="sliderValueLabel">6 months</span>
      </div>

      <div class="legend-row">
        <span><span class="legend-dot" style="background:#38bdf8"></span>Actual stock value history</span>
        <span><span class="legend-dot" style="background:#a78bfa"></span>Projected (seasonal model)</span>
      </div>

      <div class="chart-wrap"><canvas id="valueChart" role="img" aria-label="Line chart of actual and projected stock value by month"></canvas></div>
    </div>

    <div class="panel">
      <p class="panel-title">Monthly purchasing &mdash; actual vs seasonal projection</p>
      <p class="panel-sub">Real purchase order spend by month, and the seasonal shape applied to future months.</p>
      <div class="chart-wrap" style="height:280px"><canvas id="spendChart" role="img" aria-label="Bar chart of monthly purchase order spend"></canvas></div>
      <table class="month-table" id="monthTable"></table>
    </div>

    <div class="panel">
      <p class="panel-title">How this projection works</p>
      <div class="method-box">
        <strong>This is a seasonality model, not a demand forecast.</strong> It's built entirely from your own purchase order history &mdash; ${spendRows.length} months of real spend data pulled directly from DecoNetwork.
        <ul>
          <li>Each calendar month gets a seasonal index: how far that month's typical spend runs above or below your yearly average.</li>
          <li>Future months are projected by applying that same seasonal shape to your current stock value &mdash; e.g. if October has historically run 40% above average, a projected October carries that same lift.</li>
          <li>With only ${spendRows.length} months of history, this shows one year's shape, not a multi-year trend. It will get more reliable as more months accumulate &mdash; year-on-year comparison needs at least 13&ndash;24 months, which starts becoming available from month 13 onward.</li>
          <li>This projects <strong>stock value</strong>, not sales demand or cash flow &mdash; it doesn't account for price changes, new products, or supplier changes.</li>
        </ul>
      </div>
    </div>
  `;

  const slider = document.getElementById('monthSlider');
  slider.addEventListener('input', () => updateForMonths(Number(slider.value), seasonal, currentMonthNum));

  buildCharts(seasonal, currentMonthNum);
  updateForMonths(Number(slider.value), seasonal, currentMonthNum);
}

function buildCharts(seasonal, currentMonthNum){
  const sorted = spendRows.slice().sort((a,b)=>a.month_key.localeCompare(b.month_key));
  const actualLabels = sorted.map(r => {
    const [y,m] = r.month_key.split('-');
    return MONTH_NAMES[Number(m)-1] + " '" + y.slice(2);
  });

  const maxMonths = 12;
  const projPoints = projectForward(maxMonths, seasonal, currentTotalValue, currentMonthNum);
  const projLabels = projPoints.map((p,i) => {
    const d = new Date();
    d.setMonth(d.getMonth() + i + 1);
    return MONTH_NAMES[d.getMonth()] + " '" + String(d.getFullYear()).slice(2);
  });

  // Value chart: actual history is flat (only today's snapshot exists) then projected diverges by season
  const valueLabels = [...actualLabels.slice(-1), ...projLabels];
  const actualValueData = [currentTotalValue, ...new Array(projLabels.length).fill(null)];
  const projValueData = [currentTotalValue, ...projPoints.map(p => p.value)];

  const ctx1 = document.getElementById('valueChart');
  chart = new Chart(ctx1, {
    type: 'line',
    data: {
      labels: valueLabels,
      datasets: [
        { label: 'Actual', data: actualValueData, borderColor: '#38bdf8', backgroundColor: '#38bdf8', pointRadius: 4, tension: 0 },
        { label: 'Projected', data: projValueData, borderColor: '#a78bfa', backgroundColor: 'rgba(167,139,250,0.08)', borderDash: [6,4], fill: true, pointRadius: 3, tension: 0.3 }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        y: { ticks: { color: '#64748b', callback: v => '\u00a3' + Number(v).toLocaleString() }, grid: { color: '#1e2d45' } },
        x: { ticks: { color: '#64748b' }, grid: { display: false } }
      }
    }
  });

  const spendCtx = document.getElementById('spendChart');
  const spendActual = sorted.map(r => Number(r.total_spend));
  const spendProjected = projPoints.map(p => seasonal.overallAvg * p.seasonalIndex);

  new Chart(spendCtx, {
    type: 'bar',
    data: {
      labels: [...actualLabels, ...projLabels],
      datasets: [
        { label: 'Actual spend', data: [...spendActual, ...new Array(projLabels.length).fill(null)], backgroundColor: '#38bdf8', borderRadius: 4 },
        { label: 'Seasonal projection', data: [...new Array(actualLabels.length).fill(null), ...spendProjected], backgroundColor: 'rgba(167,139,250,0.5)', borderRadius: 4 }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        y: { ticks: { color: '#64748b', callback: v => '\u00a3' + Number(v).toLocaleString() }, grid: { color: '#1e2d45' } },
        x: { ticks: { color: '#64748b', maxRotation: 45, autoSkip: false }, grid: { display: false } }
      }
    }
  });

  // Month table
  const tbl = document.getElementById('monthTable');
  const rowsHtml = [
    '<tr><th>Month</th><th>PO count</th><th>Spend</th><th>Seasonal index</th></tr>',
    ...sorted.map(r => {
      const m = Number(r.month_key.slice(5,7));
      return `<tr><td>${MONTH_NAMES[m-1]} ${r.month_key.slice(0,4)}<span class="tag actual">actual</span></td><td>${r.po_count}</td><td>${money(r.total_spend)}</td><td>${(seasonal.index[m]).toFixed(2)}&times;</td></tr>`;
    }),
    ...projPoints.map((p,i) => {
      const d = new Date(); d.setMonth(d.getMonth()+i+1);
      return `<tr class="projected"><td>${MONTH_NAMES[p.monthNum-1]} ${d.getFullYear()}<span class="tag projected">projected</span></td><td>&mdash;</td><td>${money(seasonal.overallAvg*p.seasonalIndex)}</td><td>${p.seasonalIndex.toFixed(2)}&times;</td></tr>`;
    })
  ].join('');
  tbl.innerHTML = rowsHtml;

  // Peak month KPI
  let peakMonth = 1, peakIdx = 0;
  for(let m=1;m<=12;m++){ if(seasonal.index[m] > peakIdx){ peakIdx = seasonal.index[m]; peakMonth = m; } }
  document.getElementById('kpiPeak').textContent = MONTH_NAMES[peakMonth-1] + ' (' + peakIdx.toFixed(1) + '\u00d7 avg)';
}

function updateForMonths(months, seasonal, currentMonthNum){
  document.getElementById('sliderValueLabel').textContent = months + (months===1?' month':' months');
  const points = projectForward(months, seasonal, currentTotalValue, currentMonthNum);
  const target = points[points.length-1];
  document.getElementById('kpiProjected').innerHTML = moneyPrecise(target.value);

  const delta = target.value - currentTotalValue;
  const pct = currentTotalValue ? (delta/currentTotalValue*100) : 0;
  const deltaEl = document.getElementById('kpiProjectedDelta');
  if(Math.abs(pct) < 1){
    deltaEl.className = 'flat';
    deltaEl.textContent = 'Roughly flat vs today';
  } else if(delta > 0){
    deltaEl.className = 'up';
    deltaEl.textContent = '+' + pct.toFixed(1) + '% vs today (seasonal)';
  } else {
    deltaEl.className = 'down';
    deltaEl.textContent = pct.toFixed(1) + '% vs today (seasonal)';
  }
}

async function init(){
  try{
    const [spend, valueRows] = await Promise.all([
      fetchJSON(VALUE_URL, VALUE_ANON, '/rest/v1/po_spend_monthly?select=month_key,po_count,total_spend&order=month_key.asc'),
      fetchJSON(VALUE_URL, VALUE_ANON, '/rest/v1/inventory_value?select=total_value')
    ]);
    spendRows = spend.filter(r => Number(r.total_spend) > 0);
    currentTotalValue = valueRows.reduce((s,r)=>s+(Number(r.total_value)||0),0);

    if(spendRows.length < 2){
      document.getElementById('app').innerHTML = '<div class="loading">Not enough purchase history yet to build a seasonal projection. Check back once more months of data have synced.</div>';
      return;
    }
    render();
  } catch(e){
    console.error(e);
    document.getElementById('app').innerHTML = '<div class="loading">Could not load projection data. ' + e.message + '</div>';
  }
}

init();
})();
</script>
</body>
</html>
