<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ATAM Stock</title>
<style>
* { box-sizing: border-box; }
body { background: #020617; margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; color: #e8edf5; }
.topbar {
  position: sticky; top: 0; z-index: 50;
  background: rgba(2,6,23,0.95); backdrop-filter: blur(20px);
  border-bottom: 1px solid rgba(255,255,255,0.06);
  padding: 14px 28px; display: flex; align-items: center; justify-content: space-between; gap: 16px;
}
.topbar h1 { font-size: 22px; font-weight: 800; margin: 0; letter-spacing: -0.5px; }
.topbar .eyebrow { font-size: 10px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: #38bdf8; margin: 0 0 1px; }
#connectionStatus { font-size: 12px; font-weight: 700; color: #64748b; }
#connectionStatus.connected { color: #4ade80; }
.tab-bar {
  background: rgba(2,6,23,0.9); border-bottom: 1px solid #1e2d45;
  display: flex; gap: 0; overflow-x: auto; padding: 0 28px;
  scrollbar-width: none;
}
.tab-bar::-webkit-scrollbar { display: none; }
.tab-btn {
  padding: 12px 18px; border: none; background: none; color: #64748b;
  font-size: 12px; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase;
  cursor: pointer; white-space: nowrap; border-bottom: 2px solid transparent;
  transition: all 0.15s; position: relative;
}
.tab-btn:hover { color: #cbd5e1; }
.tab-btn.active { color: #38bdf8; border-bottom-color: #38bdf8; }
.tab-btn .tab-count {
  display: inline-block; background: rgba(56,189,248,0.15); color: #38bdf8;
  font-size: 10px; padding: 1px 6px; border-radius: 10px; margin-left: 5px; font-weight: 800;
}
.tab-btn.active .tab-count { background: #38bdf8; color: #04243a; }
.main { max-width: 1400px; margin: 0 auto; padding: 24px 28px 80px; }
.kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin-bottom: 24px; }
.kpi-card {
  background: #0d1525; border: 1px solid #1e2d45; border-radius: 12px; padding: 16px;
  position: relative; overflow: hidden;
}
.kpi-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, #38bdf8, #6366f1); }
.kpi-card.warn::before { background: linear-gradient(90deg, #f59e0b, #ef4444); }
.kpi-card.money::before { background: linear-gradient(90deg, #4ade80, #22d3ee); }
.kpi-card span { font-size: 10px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: #64748b; }
.kpi-card strong { display: block; font-size: 28px; font-weight: 800; margin-top: 4px; color: #f8fafc; font-variant-numeric: tabular-nums; }
.kpi-card small { display: block; font-size: 11px; color: #64748b; margin-top: 3px; }
.controls-row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; margin-bottom: 16px; }
#searchInput {
  flex: 1; min-width: 200px; background: rgba(255,255,255,0.05); border: 1px solid #1e2d45;
  border-radius: 10px; padding: 9px 14px; color: #e8edf5; font-size: 13px; outline: none;
}
#searchInput:focus { border-color: #38bdf8; }
#searchInput::placeholder { color: #475569; }
.attention-section {
  margin-bottom: 22px; border: 1px solid rgba(239,68,68,0.3); border-radius: 12px;
  background: rgba(239,68,68,0.04); overflow: hidden;
}
.attention-section.info { border-color: rgba(245,158,11,0.35); background: rgba(245,158,11,0.05); }
.attention-header {
  padding: 12px 18px; display: flex; align-items: center; gap: 10px;
  background: rgba(239,68,68,0.08); border-bottom: 1px solid rgba(239,68,68,0.2);
}
.attention-section.info .attention-header { background: rgba(245,158,11,0.1); border-bottom-color: rgba(245,158,11,0.25); }
.attention-header .dot {
  width: 7px; height: 7px; border-radius: 50%; background: #ef4444;
  box-shadow: 0 0 6px #ef4444; animation: attn-pulse 1.6s ease-in-out infinite;
}
.attention-section.info .attention-header .dot { background: #f59e0b; box-shadow: 0 0 6px #f59e0b; }
@keyframes attn-pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
.attention-header strong { font-size: 12px; font-weight: 800; letter-spacing: 0.04em; text-transform: uppercase; color: #f87171; }
.attention-section.info .attention-header strong { color: #fbbf24; }
.attention-header span { font-size: 11px; color: #94a3b8; margin-left: auto; }
.attention-body { padding: 4px 10px; }
.attention-row { display: flex; align-items: center; gap: 12px; padding: 7px 8px; border-bottom: 1px solid rgba(255,255,255,0.04); font-size: 12px; }
.attention-row:last-child { border-bottom: none; }
.attention-row .attn-name { flex: 1; color: #e8edf5; font-weight: 600; }
.attention-row .attn-meta { color: #64748b; font-size: 11px; }
.attention-empty { padding: 14px 18px; color: #4ade80; font-size: 12px; text-align: center; }
.attention-note { padding: 8px 18px 12px; color: #94a3b8; font-size: 11px; line-height: 1.5; }
.attention-body { max-height: 480px; overflow-y: auto; }
.expand-btn {
  display: block; width: 100%; background: rgba(255,255,255,0.03); border: none;
  border-top: 1px solid rgba(255,255,255,0.06); color: #38bdf8; font-size: 11px; font-weight: 700;
  letter-spacing: 0.03em; text-transform: uppercase; padding: 10px; cursor: pointer; margin-top: 4px;
}
.expand-btn:hover { background: rgba(56,189,248,0.08); }
.tab-page { display: none; }
.tab-page.active { display: block; }
.product-card { background: #0d1525; border: 1px solid #1e2d45; border-radius: 10px; margin-bottom: 8px; overflow: hidden; }
.product-header { padding: 12px 16px; display: flex; align-items: center; gap: 12px; cursor: pointer; user-select: none; }
.product-header:hover { background: rgba(56,189,248,0.04); }
.product-chevron { font-size: 11px; color: #64748b; transition: transform 0.2s ease; flex-shrink: 0; width: 12px; }
.product-card.open .product-chevron { transform: rotate(90deg); }
.product-info { flex: 1; min-width: 0; }
.product-name { font-size: 13px; font-weight: 700; color: #f8fafc; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.product-meta { font-size: 11px; color: #64748b; margin-top: 1px; }
.product-stats { display: flex; align-items: center; gap: 14px; flex-shrink: 0; }
.product-stat .val { font-size: 15px; font-weight: 800; color: #f8fafc; font-variant-numeric: tabular-nums; text-align: right; }
.product-stat .val.money { color: #4ade80; }
.product-stat .lbl { font-size: 9px; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; text-align: right; }
.low-stock-badge { background: rgba(239,68,68,0.15); color: #f87171; font-size: 9px; font-weight: 800; padding: 2px 7px; border-radius: 20px; letter-spacing: 0.04em; text-transform: uppercase; }
.variations-wrap { max-height: 0; overflow: hidden; transition: max-height 0.3s ease; border-top: 1px solid transparent; overflow-x: auto; }
.product-card.open .variations-wrap { max-height: 2000px; border-top: 1px solid #1e2d45; }
.variations-table { width: 100%; border-collapse: collapse; font-size: 12px; min-width: 400px; }
.variations-table th { text-align: center; padding: 7px 10px; font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: #475569; background: rgba(255,255,255,0.02); }
.variations-table th:first-child { text-align: left; padding-left: 16px; }
.variations-table td { padding: 8px 10px; border-top: 1px solid rgba(255,255,255,0.04); color: #cbd5e1; text-align: center; }
.variations-table td.color-cell { text-align: left; padding-left: 16px; font-weight: 700; color: #f8fafc; white-space: nowrap; }
.variations-table td.color-cell .sku-base { display: block; font-size: 10px; font-weight: 400; color: #64748b; margin-top: 1px; }
.stock-pill { display: inline-block; min-width: 28px; padding: 2px 7px; border-radius: 6px; font-weight: 700; font-variant-numeric: tabular-nums; font-size: 11px; }
.stock-pill.ok { background: rgba(34,197,94,0.12); color: #4ade80; }
.stock-pill.low { background: rgba(239,68,68,0.15); color: #f87171; }
.stock-pill.na { background: transparent; color: #2c3a52; }
.empty-state { text-align: center; padding: 50px 20px; color: #64748b; }
.last-synced { font-size: 10px; color: #475569; text-align: right; margin-top: 20px; display: flex; justify-content: flex-end; gap: 16px; }
.history-progress { font-size: 10px; color: #475569; display: flex; align-items: center; gap: 6px; }
.history-track { width: 60px; height: 4px; background: #1e2d45; border-radius: 4px; overflow: hidden; }
.history-fill { height: 100%; background: #38bdf8; }

.chat-bubble {
  position: fixed; bottom: 24px; right: 24px; width: 56px; height: 56px; border-radius: 50%;
  background: #38bdf8; display: flex; align-items: center; justify-content: center; cursor: pointer;
  box-shadow: 0 4px 20px rgba(56,189,248,0.4); z-index: 200; border: none; transition: transform 0.15s;
}
.chat-bubble:hover { transform: scale(1.06); }
.chat-bubble svg { width: 26px; height: 26px; }
.chat-panel {
  position: fixed; bottom: 92px; right: 24px; width: 360px; max-height: 520px; z-index: 200;
  background: #0d1525; border: 1px solid #1e2d45; border-radius: 16px; overflow: hidden;
  display: none; flex-direction: column; box-shadow: 0 12px 40px rgba(0,0,0,0.5);
}
.chat-panel.open { display: flex; }
.chat-header {
  padding: 14px 16px; border-bottom: 1px solid #1e2d45; display: flex; align-items: center; gap: 10px;
  background: rgba(56,189,248,0.06);
}
.chat-header .chat-avatar { width: 28px; height: 28px; border-radius: 50%; background: #38bdf8; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 800; color: #04243a; flex-shrink: 0; }
.chat-header strong { font-size: 13px; }
.chat-header small { display: block; font-size: 10px; color: #4ade80; }
.chat-close { margin-left: auto; background: none; border: none; color: #64748b; cursor: pointer; font-size: 18px; line-height: 1; padding: 4px; }
.chat-close:hover { color: #e8edf5; }
.chat-messages { flex: 1; overflow-y: auto; padding: 14px 16px; display: flex; flex-direction: column; gap: 10px; }
.chat-msg { font-size: 13px; line-height: 1.5; max-width: 88%; padding: 9px 12px; border-radius: 12px; white-space: pre-wrap; }
.chat-msg.bot { background: #161f33; color: #e8edf5; align-self: flex-start; border-bottom-left-radius: 3px; }
.chat-msg.user { background: #38bdf8; color: #04243a; align-self: flex-end; border-bottom-right-radius: 3px; font-weight: 600; }
.chat-msg.typing { color: #64748b; font-style: italic; }
.chat-input-row { border-top: 1px solid #1e2d45; padding: 10px; display: flex; gap: 8px; }
.chat-input-row input {
  flex: 1; background: rgba(255,255,255,0.05); border: 1px solid #1e2d45; border-radius: 10px;
  padding: 9px 12px; color: #e8edf5; font-size: 13px; outline: none;
}
.chat-input-row input:focus { border-color: #38bdf8; }
.chat-input-row button {
  background: #38bdf8; border: none; border-radius: 10px; width: 38px; display: flex;
  align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0;
}
.chat-input-row button:disabled { opacity: 0.5; cursor: default; }
.chat-input-row button svg { width: 16px; height: 16px; }
</style>
</head>
<body>

<div class="topbar">
  <div>
    <p class="eyebrow">ATAM Workwear</p>
    <h1>ATAM Stock</h1>
  </div>
  <div style="display:flex;align-items:center;gap:18px">
    <a href="projections.html" style="font-size:12px;font-weight:700;color:#38bdf8;text-decoration:none;display:flex;align-items:center;gap:6px;padding:7px 14px;border:1px solid rgba(56,189,248,0.3);border-radius:8px;background:rgba(56,189,248,0.08)">Projections &rarr;</a>
    <div id="connectionStatus">Connecting...</div>
  </div>
</div>

<div class="tab-bar" id="tabBar"></div>

<div class="main">

    <div class="kpi-card money"><span>Working stock value</span><strong id="kpiWorkingValue">&mdash;</strong><small id="kpiWorkingValueSub">&nbsp;</small></div>

  </div>

  <div class="controls-row">
    <input id="searchInput" type="search" placeholder="Search by product name, SKU, colour..." />

  <div id="attentionSection"></div>
  <div id="workingStockSection"></div>

  <div class="last-synced">

    <span id="lastSynced"></span>
  </div>
</div>

<button class="chat-bubble" id="chatBubble" aria-label="Open DanBot assistant">
  <svg viewBox="0 0 24 24" fill="none" stroke="#04243a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path></svg>
</button>

<div class="chat-panel" id="chatPanel">
  <div class="chat-header">
    <div class="chat-avatar">D</div>
    <div>
      <strong>DanBot</strong>
      <small>&#9679; Live stock data</small>
    </div>
    <button class="chat-close" id="chatClose" aria-label="Close chat">&times;</button>
  </div>
  <div class="chat-messages" id="chatMessages"></div>
  <div class="chat-input-row">
    <input type="text" id="chatInput" placeholder="Ask about stock, value, or orders...">
    <button id="chatSend" aria-label="Send">
      <svg viewBox="0 0 24 24" fill="none" stroke="#04243a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2 11 13"></path><path d="M22 2 15 22 11 13 2 9z"></path></svg>
    </button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
(function () {
'use strict';

const SUPABASE_URL = 'https://euvmacftbcyoassrkpyq.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV1dm1hY2Z0YmN5b2Fzc3JrcHlxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI4MzYzNDEsImV4cCI6MjA5ODQxMjM0MX0.MyYko-1IKHthPGmVmIbPEn47GYH-NDxhT8jJu20Npdw';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

// Stock VALUE project — cost, on-hand value, working stock (added alongside the existing quantity feed above)
const VALUE_URL = 'https://aobosyvlhgkxhjxkfzlz.supabase.co';
const VALUE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFvYm9zeXZsaGdreGhqeGtmemx6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1MTA4NDAsImV4cCI6MjA5NjA4Njg0MH0.MwfoPHpa--9uiwCcgtzUn2nFMBcFawQAg44rmSdisyQ';
const sbValue = supabase.createClient(VALUE_URL, VALUE_ANON);

const REORDER_TARGET_DAYS = 14;

const CATEGORIES = [
  {
    id: 'tshirts', label: 'T-Shirts',
    match: n => /t[\-\s]?shirt|tee|cool[\s-]?t|baselayer|base[\s-]?layer|ringspun|creator|valueweight/i.test(n)
  },
  {
    id: 'polos', label: 'Polos',
    match: n => /polo|piqué|pique/i.test(n)
  },
  {
    id: 'hoodies', label: 'Hoodies & Sweatshirts',
    match: n => /hoodie|hooded|sweatshirt|sweater|fleece|zoodie|cardigan|pullover|snood|mid[\s-]?layer/i.test(n)
  },
  {
    id: 'trousers', label: 'Trousers & Shorts',
    match: n => /trouser|short|cargo|combat|legging|jean|chino|jogger|pant/i.test(n)
  },
  {
    id: 'jackets', label: 'Jackets & Gilets',
    match: n => /jacket|gilet|bodywarmer|body[\s-]?warmer|softshell|soft[\s-]?shell|vest(?!.*hi[\s-]?vis)|coat|blazer|anorak/i.test(n)
  },
  {
    id: 'headwear', label: 'Headwear',
    match: n => /cap|beanie|hat|bucket|snood|scarf|balaclava|buff/i.test(n)
  },
  {
    id: 'ppe', label: 'PPE & Safety',
    match: n => /portwest|helmet|glove|goggle|glasses|ear[\s-]?(plug|defender|protect)|hi[\s-]?vis|high[\s-]?vis|mask|respirator|shoe[\s-]?cover|safety/i.test(n)
  },
  {
    id: 'workwear', label: 'Workwear',
    match: n => /apron|shirt(?!.*polo)|blouse|oxford|corporate|scrub|tunic|tabard/i.test(n)
  },
  {
    id: 'promo', label: 'Promotional',
    match: n => /johnstone|leyland|ppg|care[\s-]?uk|gori|jdc|jt[\s-]|northside|mercedes|total[\s-]?fitness/i.test(n)
  },
  {
    id: 'bags', label: 'Bags & Accessories',
    match: n => /bag|backpack|holdall|shopper|tote|lanyard|sock|socks|towel|blanket|umbrella/i.test(n)
  },
  {
    id: 'other', label: 'Other',
    match: () => true
  }
];

const SIZE_ORDER = ['XXXS','XXS','XS','S','SM','S/M','M','M/L','ML','L','L/XL','LXL','XL','2XL','XXL','3XL','XXXL','4XL','5XL','6XL'];

let allRows = [];
let valueBySku = new Map();
let workingStockOnly = [];
let valueTotals = { onHand: 0, working: 0, total: 0 };
let historyDaysCollected = 0;
let projectedNextMonth = null;

let activeTab = 'tshirts';
let searchTerm = '';
const openProducts = new Set();

function $(id) { return document.getElementById(id); }
function esc(v) { return String(v==null?'':v).replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;'); }
function num(v) { return new Intl.NumberFormat('en-GB').format(Number(v||0)); }
function money(v) {
  if (v === null || v === undefined) return '&mdash;';
  return '&pound;' + Number(v).toLocaleString('en-GB', {minimumFractionDigits:2, maximumFractionDigits:2});
}

function status(text, ok) {
  const el = $('connectionStatus');
  el.textContent = text;
  el.classList.toggle('connected', !!ok);
}

function categorise(row) {
  const name = row.product_name || '';
  for (const cat of CATEGORIES) {
    if (cat.match(name)) return cat.id;
  }
  return 'other';
}

function sizeSortKey(code) {
  const c = (code||'').toUpperCase().trim();
  const idx = SIZE_ORDER.indexOf(c);
  if (idx !== -1) return [0, idx, c];
  const n = c.match(/^(\d+)/);
  if (n) return [1, Number(n[1]), c];
  return [2, 0, c];
}

function sortSizes(codes) {
  return [...codes].sort((a,b) => {
    const ka = sizeSortKey(a), kb = sizeSortKey(b);
    if (ka[0]!==kb[0]) return ka[0]-kb[0];
    if (ka[1]!==kb[1]) return ka[1]-kb[1];
    return ka[2].localeCompare(kb[2]);
  });
}

function groupByProduct(rows) {
  const groups = {};
  for (const r of rows) {
    const key = r.product_id || r.product_name;
    if (!groups[key]) groups[key] = { product_id: r.product_id, product_name: r.product_name, product_code: r.product_code, supplier: r.supplier, variations: [], total_stock: 0, low_count: 0, total_value: 0 };
    groups[key].variations.push(r);
    groups[key].total_stock += Number(r.inv_lvl||0);
    if (r.inv_lvl <= 2) groups[key].low_count++;
    const v = valueBySku.get(r.sku);
    if (v && v.stock_value !== null && v.stock_value !== undefined) {
      groups[key].total_value += Number(v.stock_value);
    }
  }
  return Object.values(groups).sort((a,b) => a.product_name.localeCompare(b.product_name));
}

function buildProductCard(g) {
  const isOpen = openProducts.has(g.product_id);
  const sizeCodes = [...new Set(g.variations.map(v=>v.size_code).filter(Boolean))];
  const sizeCols = sortSizes(sizeCodes);
  const noSizes = sizeCols.length === 0;

  const colorGroups = {};
  for (const v of g.variations) {
    const ck = v.color_name || '&mdash;';
    if (!colorGroups[ck]) colorGroups[ck] = {};
    colorGroups[ck][v.size_code || '_'] = v;
  }
  const colors = Object.keys(colorGroups).sort();

  const hdrCols = noSizes ? '<th>On hand</th>' : sizeCols.map(s=>`<th>${esc(s)}</th>`).join('');

  const bodyRows = colors.map(color => {
    const szMap = colorGroups[color];
    if (noSizes) {
      const v = szMap['_'];
      if (!v) return '';
      return `<tr><td class="color-cell">${esc(color)}<span class="sku-base">${esc(v.sku||'')}</span></td><td><span class="stock-pill ${v.inv_lvl<=2?'low':'ok'}">${num(v.inv_lvl)}</span></td></tr>`;
    }
    const cells = sizeCols.map(sz => {
      const v = szMap[sz];
      if (!v) return '<td><span class="stock-pill na">&mdash;</span></td>';
      return `<td><span class="stock-pill ${v.inv_lvl<=2?'low':'ok'}" title="${esc(v.sku)}">${num(v.inv_lvl)}</span></td>`;
    }).join('');
    return `<tr><td class="color-cell">${esc(color)}<span class="sku-base">${esc(g.product_code||'')}</span></td>${cells}</tr>`;
  }).join('');

  const valueStat = g.total_value > 0
    ? `<div class="product-stat"><div class="val money">${money(g.total_value)}</div><div class="lbl">value</div></div>`
    : '';

  return `
    <div class="product-card ${isOpen?'open':''}" data-product-id="${esc(g.product_id)}">
      <div class="product-header" data-toggle="${esc(g.product_id)}">
        <span class="product-chevron">&#9656;</span>
        <div class="product-info">
          <div class="product-name">${esc(g.product_name)}</div>
          <div class="product-meta">${esc(g.product_code||'')} &middot; ${colors.length} colour${colors.length===1?'':'s'}</div>
        </div>
        <div class="product-stats">
          ${g.low_count > 0 ? `<span class="low-stock-badge">${g.low_count} low</span>` : ''}
          ${valueStat}
          <div class="product-stat">
            <div class="val">${num(g.total_stock)}</div>
            <div class="lbl">units</div>
          </div>
        </div>
      </div>
      <div class="variations-wrap">
        <table class="variations-table">
          <thead><tr><th>Colour</th>${hdrCols}</tr></thead>
          <tbody>${bodyRows}</tbody>
        </table>
      </div>
    </div>`;
}

function bindToggles(container) {
  container.querySelectorAll('[data-toggle]').forEach(h => {
    h.onclick = () => {
      const id = h.dataset.toggle;
      const card = h.closest('.product-card');
      if (openProducts.has(id)) { openProducts.delete(id); card.classList.remove('open'); }
      else { openProducts.add(id); card.classList.add('open'); }
    };
  });
}

function renderAttention() {
  const allCritical = allRows.filter(r=>r.inv_lvl<=2).sort((a,b)=>a.inv_lvl-b.inv_lvl);
  const totalCrit = allCritical.length;
  const el = $('attentionSection');
  if (allCritical.length === 0) {
    el.innerHTML = `<div class="attention-section"><div class="attention-header"><span class="dot" style="background:#4ade80;box-shadow:0 0 6px #4ade80"></span><strong>All stock healthy</strong></div><div class="attention-empty">No SKUs critically low right now.</div></div>`;
    return;
  }
  const expanded = el.dataset.expanded === 'true';
  const visible = expanded ? allCritical : allCritical.slice(0,10);
  el.innerHTML = `
    <div class="attention-section">
      <div class="attention-header"><span class="dot"></span><strong>Critically low &mdash; 2 or fewer units</strong><span>${totalCrit} SKU${totalCrit===1?'':'s'}</span></div>
      <div class="attention-body">
        ${visible.map(r=>`
          <div class="attention-row">
            <span class="attn-name">${esc(r.product_name)}</span>
            <span class="attn-meta">${esc(r.color_name||'')} ${esc(r.size_code||'')} &middot; ${esc(r.sku||'')}</span>
            <span class="stock-pill low" style="flex-shrink:0">${num(r.inv_lvl)}</span>
          </div>`).join('')}
        ${totalCrit>10?`<button class="expand-btn" data-expand-target="attentionSection">${expanded?'Show less':'Show all '+totalCrit+' critically low SKUs'}</button>`:''}
      </div>
    </div>`;
  bindExpandButtons(el);
}

function renderWorkingStock() {
  const el = $('workingStockSection');
  if (workingStockOnly.length === 0) {
    el.innerHTML = '';
    return;
  }
  const sorted = workingStockOnly.slice().sort((a,b) => (b.working_stock_value||0) - (a.working_stock_value||0));
  const totalHidden = sorted.length;
  const totalHiddenValue = sorted.reduce((s,r) => s + (Number(r.working_stock_value)||0), 0);
  const expanded = el.dataset.expanded === 'true';
  const visible = expanded ? sorted : sorted.slice(0,10);

  el.innerHTML = `
    <div class="attention-section info">
      <div class="attention-header"><span class="dot"></span><strong>Working stock not shown above</strong><span>${totalHidden} SKU${totalHidden===1?'':'s'} &middot; ${money(totalHiddenValue)}</span></div>
      <div class="attention-body">
        ${visible.map(r=>`
          <div class="attention-row">
            <span class="attn-name">${esc(r.product_name||r.sku)}</span>
            <span class="attn-meta">${esc(r.sku||'')}</span>
            <span class="stock-pill ok" style="flex-shrink:0;background:rgba(245,158,11,0.15);color:#fbbf24">${num(r.working_stock_qty)}</span>
          </div>`).join('')}
        ${totalHidden>10?`<button class="expand-btn" data-expand-target="workingStockSection">${expanded?'Show less':'Show all '+totalHidden+' working stock SKUs'}</button>`:''}
      </div>
      <div class="attention-note">These SKUs are already pulled to fulfil a specific order that hasn't shipped yet &mdash; real physical stock, but it shows zero above because the normal report only counts unallocated inventory.</div>
    </div>`;
  bindExpandButtons(el);
}

function bindExpandButtons(container) {
  const btn = container.querySelector('[data-expand-target]');
  if (!btn) return;
  btn.onclick = () => {
    const targetId = btn.dataset.expandTarget;
    const targetEl = $(targetId);
    const currentlyExpanded = targetEl.dataset.expanded === 'true';
    targetEl.dataset.expanded = currentlyExpanded ? 'false' : 'true';
    if (targetId === 'attentionSection') renderAttention();
    else renderWorkingStock();
  };
}

function renderTabs() {
  const skusByCat = {};
  for (const r of allRows) {
    const cat = categorise(r);
    if (!skusByCat[cat]) skusByCat[cat] = [];
    skusByCat[cat].push(r);
  }

  const tabBar = $('tabBar');
  const tabPages = $('tabPages');

  tabBar.innerHTML = CATEGORIES.map(cat => {
    const count = (skusByCat[cat.id]||[]).length;
    if (count === 0) return '';
    return `<button class="tab-btn ${cat.id===activeTab?'active':''}" data-tab="${cat.id}">${cat.label}<span class="tab-count">${count}</span></button>`;
  }).join('');

  tabPages.innerHTML = CATEGORIES.map(cat => {
    const rows = skusByCat[cat.id] || [];
    if (rows.length === 0) return '';
    let filtered = rows;
    if (searchTerm) {
      filtered = rows.filter(r => [r.product_name,r.product_code,r.color_name,r.size_code,r.sku,r.supplier].join(' ').toLowerCase().includes(searchTerm));
    }
    const groups = groupByProduct(filtered);
    const cardsHtml = groups.length
      ? groups.map(g => buildProductCard(g)).join('')
      : '<div class="empty-state">No products match your search.</div>';
    return `<div class="tab-page ${cat.id===activeTab?'active':''}" data-tab-page="${cat.id}">${cardsHtml}</div>`;
  }).join('');

  tabBar.querySelectorAll('.tab-btn').forEach(btn => {
    btn.onclick = () => {
      activeTab = btn.dataset.tab;
      tabBar.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      tabPages.querySelectorAll('.tab-page').forEach(p=>p.classList.remove('active'));
      const page = tabPages.querySelector(`[data-tab-page="${activeTab}"]`);
      if (page) { page.classList.add('active'); bindToggles(page); }
    };
  });

  const activePage = tabPages.querySelector(`[data-tab-page="${activeTab}"]`);
  if (activePage) bindToggles(activePage);
}

function renderHistoryProgress() {
  const el = $('historyProgress');
  if (!el) return;
  const pct = Math.min(100, Math.round((historyDaysCollected / REORDER_TARGET_DAYS) * 100));
  el.innerHTML = `Reorder history: ${historyDaysCollected}/${REORDER_TARGET_DAYS} days <span class="history-track"><span class="history-fill" style="width:${pct}%"></span></span>`;
}

function render() {
  const totalSkus = allRows.length;
  const totalUnits = allRows.reduce((s,r)=>s+Number(r.inv_lvl||0),0);
  const lowCount = allRows.filter(r=>r.inv_lvl<=2).length;
  const products = new Set(allRows.map(r=>r.product_id||r.product_name)).size;

  $('kpiTotal').textContent = num(totalSkus);
  $('kpiUnits').textContent = num(totalUnits);
  $('kpiLow').textContent = num(lowCount);
  $('kpiProducts').textContent = num(products);

  $('kpiTotalValue').innerHTML = money(valueTotals.total);
  $('kpiTotalValueSub').textContent = 'On-hand + working stock';
  $('kpiWorkingValue').innerHTML = money(valueTotals.working);
  $('kpiWorkingValueSub').textContent = 'Tied up in unshipped orders';

  if (projectedNextMonth) {
    $('kpiProjectedValue').innerHTML = money(projectedNextMonth.value);
    const pct = valueTotals.total ? (projectedNextMonth.delta / valueTotals.total * 100) : 0;
    const sub = $('kpiProjectedValueSub');
    sub.textContent = (pct >= 0 ? '+' : '') + pct.toFixed(1) + '% seasonal, from ' + projectedNextMonth.monthsOfHistory + 'mo history';
  } else {
    $('kpiProjectedValue').textContent = 'Gathering data';
    $('kpiProjectedValueSub').textContent = 'Needs 2+ months of PO history';
  }

  renderAttention();
  renderWorkingStock();
  renderTabs();
  renderHistoryProgress();

  const latest = allRows.reduce((max,r)=>{const t=r.synced_at?new Date(r.synced_at).getTime():0;return t>max?t:max;},0);
  if (latest) $('lastSynced').textContent = 'Last synced: '+new Date(latest).toLocaleString('en-GB');
}

async function loadValueData() {
  try {
    const { data, error } = await sbValue
      .from('inventory_value')
      .select('sku,product_name,qty_on_hand,working_stock_qty,unit_cost,stock_value,working_stock_value,total_value');
    if (error) throw error;

    const rows = data || [];
    valueBySku = new Map(rows.map(r => [r.sku, r]));
    workingStockOnly = rows.filter(r => (r.working_stock_qty||0) > 0 && (r.qty_on_hand||0) === 0);

    valueTotals = {
      onHand: rows.reduce((s,r) => s + (Number(r.stock_value)||0), 0),
      working: rows.reduce((s,r) => s + (Number(r.working_stock_value)||0), 0),
      total: rows.reduce((s,r) => s + (Number(r.total_value)||0), 0)
    };

    const { data: histData } = await sbValue.from('inventory_value_history').select('snapshot_date');
    const uniqueDates = new Set((histData||[]).map(h => h.snapshot_date));
    historyDaysCollected = uniqueDates.size;

    const { data: spendData } = await sbValue.from('po_spend_monthly').select('month_key,total_spend');
    projectedNextMonth = computeNextMonthProjection(spendData || [], valueTotals.total);
  } catch(e) {
    console.error('Value data load failed:', e);
    valueBySku = new Map();
    workingStockOnly = [];
    valueTotals = { onHand: 0, working: 0, total: 0 };
    historyDaysCollected = 0;
    projectedNextMonth = null;
  }
}

function computeNextMonthProjection(spendRows, currentValue) {
  const rows = spendRows.filter(r => Number(r.total_spend) > 0);
  if (rows.length < 2) return null;

  const byMonthNum = {};
  for (const r of rows) {
    const m = Number(r.month_key.slice(5,7));
    if (!byMonthNum[m]) byMonthNum[m] = [];
    byMonthNum[m].push(Number(r.total_spend));
  }
  const overallAvg = rows.reduce((s,r) => s + Number(r.total_spend), 0) / rows.length;
  const seasonalIndex = m => {
    if (byMonthNum[m] && byMonthNum[m].length) {
      const avg = byMonthNum[m].reduce((a,b)=>a+b,0) / byMonthNum[m].length;
      return avg / overallAvg;
    }
    return 1;
  };

  const now = new Date();
  const currentMonthNum = now.getMonth() + 1;
  const nextMonthNum = (currentMonthNum % 12) + 1;

  const baseIdx = seasonalIndex(currentMonthNum);
  const nextIdx = seasonalIndex(nextMonthNum);
  const projectedValue = currentValue * (nextIdx / baseIdx);

  return { value: projectedValue, delta: projectedValue - currentValue, monthsOfHistory: rows.length };
}

async function load() {
  status('Loading...', false);
  try {
    const { data, error } = await sb.from('inventory_levels').select('*').eq('product_deleted',false).eq('sku_deleted',false).gt('inv_lvl',0).order('product_name',{ascending:true});
    if (error) throw error;
    allRows = data || [];

    await loadValueData();

    render();
    status('Connected', true);
  } catch(e) {
    console.error(e);
    status('Error', false);
  }
}

$('searchInput').addEventListener('input', e => {
  searchTerm = e.target.value.toLowerCase().trim();
  renderTabs();
});

load();
setInterval(load, 5*60*1000);

// ---- DanBot chat widget ----
const DANBOT_URL = 'https://danbotv2.grobleroliver.workers.dev/';
const chatSessionId = 'inventory-' + Math.random().toString(36).slice(2);
let chatHistory = [];

function addChatMessage(text, role) {
  const wrap = $('chatMessages');
  const div = document.createElement('div');
  div.className = 'chat-msg ' + role;
  div.textContent = text;
  wrap.appendChild(div);
  wrap.scrollTop = wrap.scrollHeight;
  return div;
}

function currentDashboardContext() {
  return {
    total_stock_value: valueTotals.total.toFixed(2),
    onhand_value: valueTotals.onHand.toFixed(2),
    working_stock_value: valueTotals.working.toFixed(2),
    total_skus: allRows.length,
    critically_low_count: allRows.filter(r=>r.inv_lvl<=2).length,
    working_stock_only_count: workingStockOnly.length
  };
}

async function sendChatMessage(text) {
  addChatMessage(text, 'user');
  chatHistory.push(text);
  $('chatInput').value = '';
  $('chatSend').disabled = true;
  const typingEl = addChatMessage('Thinking...', 'bot typing');

  try {
    const res = await fetch(DANBOT_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text, sessionId: chatSessionId, context: currentDashboardContext() })
    });
    const data = await res.json();
    typingEl.remove();
    addChatMessage(data.reply || 'Sorry, no response.', 'bot');
  } catch (e) {
    typingEl.remove();
    addChatMessage('Could not reach DanBot right now. Try again in a moment.', 'bot');
  } finally {
    $('chatSend').disabled = false;
    $('chatInput').focus();
  }
}

$('chatBubble').addEventListener('click', () => {
  const panel = $('chatPanel');
  panel.classList.add('open');
  if (!panel.dataset.greeted) {
    panel.dataset.greeted = 'true';
    addChatMessage("Hi! I'm DanBot. Ask me about stock levels, stock value, working stock, or upcoming orders.", 'bot');
  }
  $('chatInput').focus();
});
$('chatClose').addEventListener('click', () => $('chatPanel').classList.remove('open'));
$('chatSend').addEventListener('click', () => {
  const val = $('chatInput').value.trim();
  if (val) sendChatMessage(val);
});
$('chatInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    const val = $('chatInput').value.trim();
    if (val) sendChatMessage(val);
  }
});
})();
</script>
